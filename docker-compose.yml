version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: blog-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog_platform
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
